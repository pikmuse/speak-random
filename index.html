<!doctype html>
<html lang="en">
	<head>

		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Random Word Generator</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>

		</main>

		<script src="script.js"></script>
